name: ci

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
          cache: true

      - name: Verify formatting
        run: |
          test -z "$(gofmt -l .)"

      - name: Go test
        run: go test ./... -count=1 -race -cover

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.3.4
